name: Android CI & Release Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew
      continue-on-error: true

    - name: Run Android Lint Check
      run: ./gradlew lintDebug
      continue-on-error: true

    - name: Run Unit & Robolectric Tests
      run: ./gradlew testDebugUnitTest

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hourly-Reminder-Alarm-Release-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    # Create GitHub Release automatically on push to main branch
    - name: Create Automatic Tag & Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0-${{ github.sha }}
        name: Release v1.0.0 (Auto-build)
        body: |
          ### Periodic Reminder Alarm Release
          - Production-ready Native Android build with high precision AlarmManager.
          - Multi-vibe Material 3 UI with dynamic theme status.
          - Automated boot rescheduled receiver.
          - Secure system permissions self-diagnosis panel.
        draft: false
        prerelease: false
        files: app/build/outputs/apk/release/app-release-unsigned.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
